name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Test
        run: cargo test --all

  # F-26: CLI smoke test — verify every documented flag is present in --help.
  smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build slateduck binary
        run: cargo build -p slateduck-pgwire --bin slateduck

      - name: Verify documented CLI flags are present
        run: |
          HELP=$(./target/debug/slateduck serve --help 2>&1 || true)
          for flag in \
            "--tls-cert" \
            "--tls-key" \
            "--tls-required" \
            "--auth-user" \
            "--auth-password" \
            "--bind" \
            "--catalog" \
            "--datafusion-pg-wire"; do
            if echo "$HELP" | grep -qF -- "$flag"; then
              echo "OK: $flag"
            else
              echo "MISSING FLAG: $flag" && exit 1
            fi
          done
          echo "All documented flags verified."

  # F-28/F-33: Security — cargo audit + cargo deny advisories check.
  # F-29: MSRV declaration is verified here: rust-version must be set in workspace Cargo.toml.
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify MSRV is declared in workspace Cargo.toml
        run: grep -q 'rust-version' Cargo.toml || (echo "rust-version missing from Cargo.toml" && exit 1)

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny (advisories + bans + sources)
        run: cargo deny check advisories bans sources

  # F-33: Code coverage — report coverage for slateduck-catalog and slateduck-core.
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage
        run: |
          cargo llvm-cov \
            -p slateduck-catalog \
            -p slateduck-core \
            --summary-only 2>&1 | tee coverage-summary.txt
          COVERAGE=$(grep 'TOTAL' coverage-summary.txt | awk '{print $10}' | tr -d '%' || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if [ "${COVERAGE%.*}" -lt 80 ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 80% threshold (enforced at v1.0)"
          fi

