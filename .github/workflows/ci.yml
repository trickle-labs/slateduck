name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Test
        run: cargo test --all

  # F-26: CLI smoke test — verify every documented flag is present in --help.
  smoke-test:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build slateduck binary
        run: cargo build -p slateduck-pgwire --bin slateduck

      - name: Verify documented CLI flags are present
        run: |
          HELP=$(./target/debug/slateduck serve --help 2>&1 || true)
          for flag in \
            "--tls-cert" \
            "--tls-key" \
            "--tls-required" \
            "--auth-user" \
            "--auth-password" \
            "--bind" \
            "--catalog" \
            "--datafusion-pg-wire" \
            "--metrics-path"; do
            if echo "$HELP" | grep -qF -- "$flag"; then
              echo "OK: $flag"
            else
              echo "MISSING FLAG: $flag" && exit 1
            fi
          done
          echo "All documented flags verified."

  # F-28/F-33: Security — cargo deny advisories check (uses deny.toml ignore list).
  # F-29: MSRV declaration is verified here: rust-version must be set in workspace Cargo.toml.
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify MSRV is declared in workspace Cargo.toml
        run: grep -q 'rust-version' Cargo.toml || (echo "rust-version missing from Cargo.toml" && exit 1)

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo deny (advisories + bans + sources + licenses)
        run: cargo deny check advisories bans sources licenses

  # v0.21: MSRV 1.93 compliance check — ensures the workspace compiles on the declared minimum toolchain.
  msrv:
    name: MSRV Check (1.93)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93
      - uses: Swatinem/rust-cache@v2

      - name: cargo check on MSRV 1.93
        run: cargo check --workspace --all-targets

  # F-33: Code coverage — full workspace coverage for all 9 production crates.
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage (all production crates)
        run: |
          cargo llvm-cov \
            -p slateduck-catalog \
            -p slateduck-core \
            -p slateduck-sql \
            -p slateduck-pgwire \
            -p slateduck-ffi \
            -p slateduck-datafusion \
            --summary-only 2>&1 | tee coverage-summary.txt
          COVERAGE=$(grep 'TOTAL' coverage-summary.txt | awk '{print $10}' | tr -d '%' || echo "0")
          echo "Coverage: ${COVERAGE}%"
          if [ "${COVERAGE%.*}" -lt 80 ]; then
            echo "::error::Coverage ${COVERAGE}% is below the 80% gate"
            exit 1
          fi

      - name: Per-crate coverage minimums
        run: |
          check_cov() {
            local crate=$1 min=$2
            local pct
            pct=$(cargo llvm-cov -p "$crate" --summary-only 2>&1 | grep 'TOTAL' | awk '{print $10}' | tr -d '%' || echo "0")
            echo "${crate} coverage: ${pct}%"
            if [ "${pct%.*}" -lt "$min" ]; then
              echo "::error::${crate} coverage ${pct}% is below the ${min}% minimum"
              exit 1
            fi
          }
          check_cov slateduck-core 85
          check_cov slateduck-catalog 85
          check_cov slateduck-sql 80
          check_cov slateduck-pgwire 75

  # Tier 7: Fault injection tests (catalog).
  fault-injection:
    name: Fault Injection Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Catalog fault injection tests
        run: cargo test -p slateduck-catalog --test fault_injection_tests

  # Tier 10: Security tests (PG-Wire protocol layer).
  security-tests:
    name: Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: PG-Wire security tests
        run: cargo test -p slateduck-pgwire --test security_tests

  # N-11: Network-level PG-Wire integration test.
  # Spawns the real slateduck binary and verifies a tokio-postgres client can
  # complete a full DDL/DML/query cycle over a real TCP socket.
  network-integration:
    name: Network Integration Tests
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Network-level PG-Wire tests
        run: cargo test -p slateduck-pgwire --test pgwire_network_test -- --test-threads=1

  # Benchmark regression check.
  benchmarks:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check benchmark thresholds
        run: python scripts/check_benchmark_regression.py benchmarks/phase-2-baseline.json

