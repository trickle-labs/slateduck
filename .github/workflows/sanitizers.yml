name: Sanitizers and Miri

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  asan-ubsan:
    name: ASAN + UBSAN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Run with ASAN
        env:
          RUSTFLAGS: "-Z sanitizer=address"
        run: cargo test -p slateduck-ffi --target x86_64-unknown-linux-gnu
      - name: Run with UBSAN
        env:
          RUSTFLAGS: "-Z sanitizer=undefined"
        run: cargo test -p slateduck-ffi --target x86_64-unknown-linux-gnu

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Run Miri (slateduck-ffi)
        run: cargo miri test -p slateduck-ffi
      - name: Run Miri (slateduck-core key and value encode/decode)
        run: cargo miri test -p slateduck-core
