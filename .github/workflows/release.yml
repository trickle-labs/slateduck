name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  # Bump workspace version in Cargo.toml to match the pushed tag and
  # commit the change back to main so subsequent jobs (and the codebase)
  # reflect the correct version number.
  prepare:
    name: Bump Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the full history so we can push back to main.
          fetch-depth: 0
          ref: main

      - name: Extract version from tag
        id: version
        run: |
          RAW="${GITHUB_REF#refs/tags/v}"
          echo "version=${RAW}" >> "$GITHUB_OUTPUT"

      - name: Update workspace version in Cargo.toml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          # Only bump if tag version is newer than (or equal to) current version.
          # This prevents accidentally downgrading main when re-releasing an older tag.
          HIGHEST=$(printf '%s\n%s\n' "$CURRENT" "$VERSION" | sort -V | tail -1)
          if [ "$HIGHEST" = "$VERSION" ]; then
            sed -i "s/^version = \".*\"$/version = \"${VERSION}\"/" Cargo.toml
          else
            echo "Skipping version bump: tag ${VERSION} <= current ${CURRENT} — no downgrade"
          fi

      - uses: dtolnay/rust-toolchain@stable

      - name: Regenerate Cargo.lock
        run: cargo generate-lockfile

      - name: Commit version bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          if git diff --staged --quiet; then
            echo "No changes to commit — version already at ${VERSION}"
          else
            git commit -m "chore: bump workspace version to ${VERSION} [skip ci]"
            git push origin main
          fi

  # Run the full quality gate before building release artifacts.
  quality-gate:
    name: Quality Gate
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Test
        run: cargo test --all

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit

  # Build release binaries for each target platform.
  build:
    name: Build (${{ matrix.target }})
    needs: quality-gate
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: rocklake-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: rocklake-linux-aarch64
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: rocklake-macos-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross (for aarch64 Linux)
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build release binary (native)
        if: matrix.cross != true
        run: |
          cargo build -p rocklake-pgwire --bin rocklake --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/rocklake ${{ matrix.artifact }}

      - name: Build release binary (cross)
        if: matrix.cross == true
        run: |
          cross build -p rocklake-pgwire --bin rocklake --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/rocklake ${{ matrix.artifact }}

      - name: Generate checksum
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # Create a GitHub Release with all binaries and checksums.
  release:
    name: GitHub Release
    needs: [build, prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: RockLake v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          files: |
            artifacts/rocklake-*
          generate_release_notes: true
          body: |
            ## RockLake v${{ needs.prepare.outputs.version }}

            ### Installation

            Download the binary for your platform, verify the checksum, and make it executable:

            ```bash
            # Linux x86-64
            curl -LO https://github.com/trickle-labs/rocklake/releases/download/v${{ needs.prepare.outputs.version }}/rocklake-linux-x86_64
            sha256sum -c rocklake-linux-x86_64.sha256
            chmod +x rocklake-linux-x86_64
            mv rocklake-linux-x86_64 /usr/local/bin/rocklake
            ```

            See [CHANGELOG.md](https://github.com/trickle-labs/rocklake/blob/main/CHANGELOG.md) for full release notes.
