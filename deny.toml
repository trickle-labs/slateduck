# cargo-deny configuration for SlateDuck
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Target triples to check.  Ubuntu x86-64 and macOS arm64 cover CI.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

# ─── Advisories ───────────────────────────────────────────────────────────────
[advisories]
# Deny any crates with known security vulnerabilities.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# These advisories are from transitive dependencies we cannot directly control.
# They are tracked; we will update when upstream provides a fix.
ignore = [
    # bincode: unmaintained (use bincode 2.x when upstream migrates)
    "RUSTSEC-2025-0141",
    # paste: unmaintained macro crate (transitive dep of several crates)
    "RUSTSEC-2024-0436",
    # rustls-pemfile: older API usage (transitive from tokio-rustls 0.26)
    "RUSTSEC-2025-0134",
]

# Removed from ignore list at v0.21:
# - RUSTSEC-2024-0370 (proc-macro-error via dbsp/utoipa) — no longer detected in dep tree.
# - RUSTSEC-2025-0057 (fxhash via wasmtime 43) — no longer detected in dep tree.

# ─── Licenses ─────────────────────────────────────────────────────────────────
# v0.21: License enforcement enabled.  Allow list covers all licenses found in
# the dependency tree as of v0.21.  Crates outside this list require an explicit
# exception with rationale.
[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "ISC",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
# Exceptions: crates whose licenses are outside the allow list but vetted.
[[licenses.exceptions]]
# ring uses a custom OpenSSL-compatible license; acceptable for crypto.
allow = ["LicenseRef-ring"]
crate = "ring"
[[licenses.exceptions]]
# webpki uses ISC + custom; acceptable for TLS certificate parsing.
allow = ["LicenseRef-webpki"]
crate = "webpki"
[[licenses.exceptions]]
# fxhash uses Apache-2.0/MIT with no issues (unlicense-compatible).
allow = ["MIT", "Apache-2.0"]
crate = "fxhash"

# ─── Bans ─────────────────────────────────────────────────────────────────────
[bans]
# Warn (not deny) on duplicate versions of the same crate (common in large dep trees).
multiple-versions = "warn"
# Warn on wildcard dependencies (path-only workspace deps have implicit "*" version).
wildcards = "warn"

# ─── Sources ──────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io and local paths.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
