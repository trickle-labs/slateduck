# cargo-deny configuration for SlateDuck
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Target triples to check.  Ubuntu x86-64 and macOS arm64 cover CI.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]

# ─── Advisories ───────────────────────────────────────────────────────────────
[advisories]
# Deny any crates with known security vulnerabilities.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# These advisories are from transitive dependencies we cannot directly control.
# They are tracked; we will update when upstream provides a fix.
ignore = [
    # bincode: unmaintained (use bincode 2.x when upstream migrates)
    "RUSTSEC-2025-0141",
    # paste: unmaintained macro crate (transitive dep of several crates)
    "RUSTSEC-2024-0436",
    # rustls-pemfile: older API usage (transitive from tokio-rustls 0.26)
    "RUSTSEC-2025-0134",
    # proc-macro-error: unmaintained — transitive dep via dbsp → utoipa → utoipa-gen.
    # No upstream fix available in dbsp 0.299.0; tracked for next dbsp bump.
    "RUSTSEC-2024-0370",
    # fxhash: unmaintained — transitive dep via wasmtime 29.
    "RUSTSEC-2025-0057",
    # wasmtime 29 advisories — mitigated by UDF sandbox (no WASI, fuel/memory limits).
    # Tracked for upgrade to wasmtime 34+ in v0.18/v0.19.
    "RUSTSEC-2025-0046",
    "RUSTSEC-2025-0118",
    "RUSTSEC-2026-0006",
    "RUSTSEC-2026-0020",
    "RUSTSEC-2026-0021",
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",
]

# ─── Licenses ─────────────────────────────────────────────────────────────────
# License checking is disabled for v0.9.4.  Enable at v1.0 GA when the full
# dependency tree has been audited for license compatibility.
[licenses]
version = 2
# License checking is intentionally minimal for v0.9.4.
# Tighten at v1.0 GA after a full dependency audit.

# ─── Bans ─────────────────────────────────────────────────────────────────────
[bans]
# Warn (not deny) on duplicate versions of the same crate (common in large dep trees).
multiple-versions = "warn"
# Warn on wildcard dependencies (path-only workspace deps have implicit "*" version).
wildcards = "warn"

# ─── Sources ──────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io and local paths.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
