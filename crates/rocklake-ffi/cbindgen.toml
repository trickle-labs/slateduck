# cbindgen configuration for rocklake-ffi
# Generates crates/rocklake-ffi/include/rocklake.h

language = "C"
header = """/**
 * rocklake.h — C ABI header for the RockLake catalog client library.
 *
 * Generated by cbindgen — do not edit manually.
 * See crates/rocklake-ffi/cbindgen.toml for configuration.
 *
 * This header is the stable interface for:
 *   - Language bindings (Python/PyO3, Go/cgo, Node.js/napi-rs)
 *   - The native DuckDB extension (v0.36.0)
 *   - Any other embedding caller
 *
 * See docs/reference/c-api.md for the full function reference.
 */"""

include_guard = "ROCKLAKE_GENERATED_H"
include_version = false
tab_width = 4
usize_is_size_t = true

[export]
prefix = "RockLake"
item_types = ["enums", "structs", "functions"]
include = [
    "RockLakeError",
    "RockLakeErrorCode",
    "RockLakeCatalog",
    "RockLakeSnapshot",
    "RockLakeDataFile",
    "RockLakeFileList",
    "RockLakeSchema",
    "RockLakeSchemaList",
    "RockLakeTable",
    "RockLakeTableList",
    "RockLakeColumn",
    "RockLakeColumnList",
    "rocklake_abi_version",
    "rocklake_open",
    "rocklake_close",
    "rocklake_error_code",
    "rocklake_error_message",
    "rocklake_error_free",
    "rocklake_get_current_snapshot",
    "rocklake_list_schemas",
    "rocklake_schema_list_free",
    "rocklake_list_tables",
    "rocklake_table_list_free",
    "rocklake_describe_table",
    "rocklake_column_list_free",
    "rocklake_list_data_files",
    "rocklake_file_list_free",
]
